<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲啟動器</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: #f8f9fa;
        }
        /* 灰色側邊欄樣式 */
        .sidebar {
            width: 250px;
            background-color: #343a40; /* 深灰色背景 */
            color: #ffffff; /* 白色文字 */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        /* 灰色按鈕樣式 */
        .list-group-item-custom {
            background-color: #495057; /* 預設中灰色 */
            color: #e9ecef;
            border: none;
            margin-bottom: 5px;
            border-radius: 6px !important;
            transition: all 0.2s;
        }
        .list-group-item-custom:hover {
            background-color: #6c757d; /* 滑鼠游標移上去的亮灰色 */
            color: #ffffff;
        }
        /* 被選中時的特殊灰色 */
        .list-group-item-custom.active {
            background-color: #212529 !important; /* 點選後的極深灰 */
            color: #ffffff !important;
            font-weight: bold;
        }
        /* 遊戲畫面區塊 */
        .game-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="sidebar p-3">
        <div>
            <h3 class="fs-4 text-center mb-4 text-light"><i class="bi bi-controller"></i> 遊戲啟動器</h3>
            <hr class="text-secondary">
            <p class="text-secondary small fw-bold">選擇遊戲版本：</p>
            
            <div class="list-group">
                <button onclick="switchVersion('v1.0')" id="btn-v1.0" class="list-group-item list-group-item-custom active">
                    <i class="bi bi-star-fill me-2"></i> 正式版 v1.0
                </button>
                <button onclick="switchVersion('beta')" id="btn-beta" class="list-group-item list-group-item-custom">
                    <i class="bi bi-bug-fill me-2"></i> 測試版 Beta
                </button>
            </div>
        </div>

        <div class="text-center text-secondary small">
            <hr class="text-secondary">
            <p>目前版本: <span id="current-version-text" class="fw-bold text-light">v1.0</span></p>
        </div>
    </div>

    <div class="game-container">
        <iframe id="game-frame" src="game_v1.0.html"></iframe>
    </div>

    <script>
        const gameVersions = {
            'v1.0': 'game_v1.0.html',
            'beta': 'game_beta.html'
        };

        function switchVersion(versionKey) {
            const iframe = document.getElementById('game-frame');
            iframe.src = gameVersions[versionKey];

            const versionNames = { 'v1.0': '正式版 v1.0', 'beta': '測試版 Beta' };
            document.getElementById('current-version-text').innerText = versionNames[versionKey];

            // 切換按鈕的選取狀態
            document.querySelectorAll('.list-group-item-custom').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(`btn-${versionKey}`).classList.add('active');
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
