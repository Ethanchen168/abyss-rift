<!DOCTYPE html>
<html lang="zh-TW" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>裂縫深淵 啟動器</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome 圖標 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // 上方深灰色風格 (Bootstrap Slate Gray)
            header: {
              900: '#1e2022',
              800: '#2d3135',
              700: '#3f4448',
              text: '#f1f2f3'
            },
            // 黃色品牌色 (Vibrant Gold/Yellow)
            brandYellow: {
              400: '#fcd34d',
              500: '#f59e0b', // 溫暖亮黃
              600: '#d97706'
            },
            // 淺灰色風格 (Minimal Light Gray)
            lightGray: {
              50: '#f9fafb',   // 極淺底色
              100: '#f3f4f6',  // 主背景灰色
              200: '#e5e7eb',  // 卡片邊框、副背景
              300: '#d1d5db',  // 分隔線
              800: '#374151',  // 內文文字色
              900: '#111827'   // 深灰標題色
            }
          }
        }
      }
    }
  </script>
  <style>
    /* 隱藏滾動條但保留功能 */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-lightGray-100 text-lightGray-800 font-sans h-full flex flex-col select-none overflow-hidden">

  <!-- ================= 上方深灰色導覽列 (Top Header) ================= -->
  <header class="bg-header-900 text-header-text border-b border-header-800 px-4 sm:px-6 py-4 flex items-center justify-between shadow-md z-20 flex-shrink-0">
    <div class="flex items-center space-x-3">
      <!-- 漢堡選單按鈕 (僅在 lg 以下螢幕顯示) -->
      <button onclick="toggleSidebar(true)" class="lg:hidden text-white hover:text-brandYellow-400 p-1.5 rounded-lg focus:outline-none transition cursor-pointer" title="開啟選單">
        <i class="fa-solid fa-bars text-lg"></i>
      </button>
      
      <div class="flex items-center space-x-2.5">
        <div class="w-8 h-8 rounded bg-gradient-to-br from-header-700 to-header-800 flex items-center justify-center text-brandYellow-400 text-sm shadow">
          <i class="fa-solid fa-gamepad"></i>
        </div>
        <div>
          <h1 class="font-bold tracking-wider text-sm sm:text-base text-white">裂縫深淵</h1>
        </div>
      </div>
    </div>
  </header>

  <!-- 全域版面配置：左側黑色側邊欄 + 右側主內容區 -->
  <div class="flex-1 flex relative overflow-hidden">

    <!-- ================= 手機版側邊欄背景遮罩 (Overlay Backdrop) ================= -->
    <div id="sidebar-backdrop" onclick="toggleSidebar(false)" class="fixed inset-0 bg-black/50 z-30 hidden transition-opacity duration-300 opacity-0 lg:hidden"></div>

    <!-- ================= 左側大黑色側邊欄 (Large Black Sidebar) ================= -->
    <aside id="large-sidebar" class="fixed inset-y-0 left-0 w-72 sm:w-80 bg-neutral-950 border-r border-neutral-800 z-40 transform -translate-x-full lg:translate-x-0 lg:static lg:w-72 xl:w-80 flex-shrink-0 flex flex-col justify-between transition-transform duration-300 ease-in-out shadow-2xl lg:shadow-none text-neutral-300">
      
      <!-- 側邊欄頂部：版本標題與關閉按鈕 -->
      <div class="p-5 border-b border-neutral-800 flex flex-col space-y-4 flex-shrink-0">
        <div class="flex items-center justify-between">
          <div class="flex items-center space-x-2">
            <i class="fa-solid fa-code-branch text-brandYellow-500 text-sm"></i>
            <h3 class="text-sm font-bold text-white uppercase tracking-wider">選擇遊戲版本</h3>
          </div>
          <!-- 手機版專用關閉按鈕 -->
          <button onclick="toggleSidebar(false)" class="lg:hidden text-neutral-400 hover:text-white p-1 rounded-lg transition cursor-pointer" title="關閉選單">
            <i class="fa-solid fa-xmark text-md"></i>
          </button>
        </div>
        <p class="text-[11px] text-neutral-400 leading-relaxed">請在下方選單中點選遊戲版本，啟動器將會自動讀取 GitHub 儲存庫對應的檔案路徑。</p>
      </div>

      <!-- 側邊欄中部：版本列表滾動區域 -->
      <div id="version-sidebar-container" class="flex-1 overflow-y-auto p-4 space-y-2.5 no-scrollbar bg-neutral-900/40">
        <!-- 由 JS 動態渲染版本按鈕 -->
      </div>

      <!-- 側邊欄底部：版權與說明 -->
      <div class="p-4 bg-neutral-950 border-t border-neutral-800 text-center text-[10px] text-neutral-500 flex-shrink-0">
        <p>© 2026 裂縫深淵</p>
        <p class="mt-0.5">基於 GitHub Pages 相對路徑建構</p>
      </div>
    </aside>

    <!-- ================= 右側主內容區 (Main Light Gray Container) ================= -->
    <main class="flex-1 p-4 sm:p-6 md:p-8 overflow-y-auto bg-lightGray-100 flex flex-col items-center">
      
      <!-- my-auto 確保小螢幕可順暢滑動不切頭 -->
      <div class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-12 gap-5 md:gap-6 items-stretch my-auto py-2 sm:py-4">
        
        <!-- 中間：版本詳細介紹卡片 (佔 7/12) -->
        <div class="md:col-span-7 bg-white border border-lightGray-200 rounded-2xl p-5 sm:p-6 shadow-sm flex flex-col justify-between space-y-5">
          <div>
            <!-- 標題 -->
            <div class="pb-3.5 border-b border-lightGray-200">
              <h2 class="text-base sm:text-lg font-bold text-lightGray-900 flex items-center space-x-2">
                <i class="fa-solid fa-circle-info text-lightGray-800"></i>
                <span>遊戲版本介紹</span>
              </h2>
            </div>

            <!-- 遊戲版本詳情展示 -->
            <div class="mt-4 space-y-3.5">
              <div class="flex items-center space-x-2 flex-wrap gap-y-1">
                <span id="display-version-title" class="text-sm sm:text-md font-bold text-lightGray-900">載入中...</span>
                <span id="display-version-branch" class="text-[9px] sm:text-[10px] px-2 py-0.5 rounded-full font-bold bg-lightGray-200 text-lightGray-855">分支</span>
              </div>
              
              <div class="bg-lightGray-100/70 rounded-xl p-3.5 sm:p-4 border border-lightGray-200">
                <h4 class="text-[11px] sm:text-xs font-bold text-lightGray-900 uppercase tracking-wide mb-2">更新說明與更動項目：</h4>
                <ul id="display-version-changelog" class="list-disc pl-5 text-xs text-lightGray-800/80 space-y-1.5 leading-relaxed">
                  <!-- 動態注入更動日誌 -->
                </ul>
              </div>
            </div>
          </div>

          <!-- 輔育說明 -->
          <div class="text-[10px] sm:text-[11px] text-lightGray-800/60 pt-3.5 border-t border-lightGray-200 flex items-center space-x-1.5 flex-wrap gap-y-1">
            <i class="fa-solid fa-folder-open text-brandYellow-500"></i>
            <span id="display-version-path" class="font-mono bg-lightGray-100 px-1.5 py-0.5 rounded text-[10px]">路徑：--</span>
            <span id="display-version-date" class="ml-auto text-[10px]">更新日期：----/--/--</span>
          </div>
        </div>

        <!-- 右側：開始遊戲按鈕大卡片 (佔 5/12) -->
        <div class="md:col-span-5 bg-white border border-lightGray-200 rounded-2xl p-6 sm:p-8 shadow-sm flex flex-col justify-center items-center text-center relative overflow-hidden min-h-[220px] md:min-h-auto">
          <!-- 裝飾背景浮水印 -->
          <div class="absolute -right-8 -bottom-8 opacity-[0.03] text-[120px] sm:text-[150px] pointer-events-none text-lightGray-900"><i class="fa-solid fa-gamepad"></i></div>

          <div class="w-12 h-12 sm:w-16 sm:h-16 rounded-2xl bg-lightGray-100 flex items-center justify-center text-brandYellow-500 mb-3 sm:mb-4 shadow-inner border border-lightGray-200">
            <i class="fa-solid fa-rocket text-xl sm:text-2xl"></i>
          </div>

          <div class="space-y-1 mb-6 sm:mb-8 z-10">
            <h3 class="text-[10px] sm:text-xs font-bold text-lightGray-800/70 uppercase tracking-widest">當前選擇版本</h3>
            <p id="launch-card-ver-name" class="text-sm sm:text-md font-bold text-lightGray-900 truncate max-w-[200px] sm:max-w-[240px]">載入中...</p>
            <span id="launch-card-ver-tag" class="inline-block text-[9px] sm:text-[10px] font-mono bg-lightGray-200 px-2 py-0.5 rounded text-lightGray-855 font-semibold">v0.0.0</span>
          </div>

          <!-- 醒目的亮黃色大按鈕 -->
          <button onclick="launchGame()" class="w-full py-3.5 px-6 bg-brandYellow-500 hover:bg-brandYellow-600 text-header-900 font-extrabold rounded-xl shadow-md hover:shadow-lg transition-all transform active:scale-95 flex items-center justify-center space-x-2.5 text-base sm:text-lg z-10 cursor-pointer">
            <i class="fa-solid fa-circle-play text-lg sm:text-xl"></i>
            <span>開始遊戲</span>
          </button>

          <p class="text-[9px] sm:text-[10px] text-lightGray-800/65 mt-3.5 z-10">點擊後將直接啟動遊戲檔案</p>
        </div>

      </div>
    </main>
  </div>

  <!-- ================= 遊戲運行全螢幕覆蓋面板 (Game Player Embed) ================= -->
  <div id="game-player-screen" class="fixed inset-0 bg-black z-50 flex flex-col hidden transition-all duration-300">
    <!-- 頂部深色功能條 -->
    <div class="h-14 bg-header-900 border-b border-header-800 flex items-center justify-between px-3 sm:px-4 z-10 text-header-text flex-shrink-0">
      <div class="flex items-center space-x-2 sm:space-x-3 min-w-0">
        <span id="player-game-title" class="font-bold text-white text-xs sm:text-sm tracking-wide truncate max-w-[120px] sm:max-w-[240px]">載入中...</span>
        <span id="player-game-version-badge" class="text-[10px] bg-header-800 px-1.5 py-0.5 rounded text-gray-300 font-mono flex-shrink-0">v0.0</span>
      </div>
      
      <!-- 僅保留「結束」按鈕，移除重新載入與全螢幕按鈕 -->
      <div class="flex items-center space-x-1.5 sm:space-x-2">
        <button onclick="closeGamePlayer()" class="bg-red-950 hover:bg-red-900 text-red-200 hover:text-white px-3 sm:px-4 py-2 rounded-lg text-xs font-semibold transition flex items-center space-x-1.5">
          <i class="fa-solid fa-power-off"></i>
          <span class="hidden xs:inline">結束</span>
        </button>
      </div>
    </div>

    <!-- TurboWarp iframe 容器 -->
    <div class="flex-1 bg-black relative flex items-center justify-center min-h-0">
      <!-- 載入等待動畫 -->
      <div id="player-loading-overlay" class="absolute inset-0 bg-header-900 flex flex-col items-center justify-center space-y-4 z-20">
        <div class="w-10 h-10 border-4 border-brandYellow-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-xs text-gray-400">正在加載遊戲與引擎資源...</p>
      </div>
      <!-- 實際 Iframe 節點 -->
      <iframe id="turbowarp-iframe" class="w-full h-full border-0" allowtransparency="true" allowfullscreen="true" allow="autoplay; gamepad; camera; microphone"></iframe>
    </div>
  </div>

  <!-- ================= 系統微調通知訊息 (Custom Alert Box) ================= -->
  <div id="custom-toast" class="fixed bottom-6 right-6 left-6 sm:left-auto bg-white border border-lightGray-200 rounded-xl shadow-2xl p-4 flex items-center space-x-3 translate-y-24 opacity-0 transition-all duration-300 z-50 text-lightGray-800 max-w-sm">
    <div id="toast-icon-wrapper" class="w-8 h-8 rounded-full flex items-center justify-center text-sm flex-shrink-0">
      <i class="fa-solid fa-circle-check"></i>
    </div>
    <div>
      <h4 id="toast-title" class="font-bold text-xs text-lightGray-900">通知</h4>
      <p id="toast-desc" class="text-[11px] text-lightGray-800/80">動作已成功完成。</p>
    </div>
  </div>

  <!-- ================= 系統邏輯核心 JavaScript ================= -->
  <script>
    /**
     * 支援三種來源載入方式 (非常適合儲存於 GitHub 儲存庫內)：
     * 1. sourceType: "local"  -> 直接讀取相對路徑下打包好的 index.html 網頁 (最推薦、完全自代管)
     * 2. sourceType: "sb3"    -> 讀取儲存庫中的相對 .sb3 專案，動態計算網址後經 TurboWarp 載入
     * 3. sourceType: "online" -> 仍使用 Scratch 官方或 TurboWarp 線上共用的 ID
     */
    const GAME_VERSIONS = [
      {
        id: "v1",
        tag: "v0.0.1",
        name: "裂縫深淵：第一個可用版本",
        sourceType: "local",
        path: "html/alpha1.html", // 您在 GitHub 儲存庫中的相對路徑
        projectId: "",
        date: "2026-05-24",
        branch: "內部測試版(Alpha版)",
        changelog: [
          "只包含移動的超簡易版本"
        ]
      }
    ];

    // 全局選中狀態
    let selectedVersionId = "v1";

    // 初始化
    window.onload = function() {
      renderVersionSidebar();
      updateDisplayUI();
    };

    // 渲染側邊欄清單
    function renderVersionSidebar() {
      const container = document.getElementById("version-sidebar-container");
      container.innerHTML = "";

      GAME_VERSIONS.forEach(ver => {
        const isActive = ver.id === selectedVersionId;
        
        // 建立按鈕元素
        const btn = document.createElement("button");
        btn.onclick = () => selectVersion(ver.id);
        
        // 側邊欄按鈕外觀 - 適配深黑背景 (選取時帶黃色指示，未選取時為高質感知性深色 hover)
        if (isActive) {
          btn.className = "w-full flex flex-col text-left p-3.5 rounded-xl border border-neutral-800 bg-neutral-900 shadow-sm text-white font-bold border-l-4 border-l-brandYellow-500 transition-all cursor-pointer flex-shrink-0";
        } else {
          btn.className = "w-full flex flex-col text-left p-3.5 rounded-xl border border-transparent bg-transparent hover:bg-neutral-900 text-neutral-400 hover:text-white transition-all cursor-pointer flex-shrink-0";
        }

        // 按鈕內部 HTML (適配深色底)
        btn.innerHTML = `
          <div class="flex items-center justify-between w-full mb-1 pointer-events-none">
            <span class="text-[10px] font-mono px-2 py-0.5 rounded ${isActive ? 'bg-brandYellow-500 text-header-900 font-extrabold' : 'bg-neutral-800 text-neutral-300'}">${ver.tag}</span>
            <span class="text-[9px] ${isActive ? 'text-brandYellow-400/80' : 'text-neutral-500'}">${ver.date}</span>
          </div>
          <span class="text-xs truncate w-full pointer-events-none ${isActive ? 'text-white font-extrabold' : 'text-neutral-300'}">${ver.name}</span>
        `;
        
        container.appendChild(btn);
      });
    }

    // 側邊欄開合控制器 (手機版漢堡選單)
    function toggleSidebar(open) {
      const sidebar = document.getElementById("large-sidebar");
      const backdrop = document.getElementById("sidebar-backdrop");

      if (open) {
        backdrop.classList.remove("hidden");
        setTimeout(() => {
          backdrop.classList.add("opacity-100");
          sidebar.classList.remove("-translate-x-full");
        }, 10);
      } else {
        sidebar.classList.add("-translate-x-full");
        backdrop.classList.remove("opacity-100");
        setTimeout(() => {
          backdrop.classList.add("hidden");
        }, 300);
      }
    }

    // 版本選擇
    function selectVersion(id) {
      selectedVersionId = id;
      renderVersionSidebar();
      updateDisplayUI();
      
      const ver = GAME_VERSIONS.find(v => v.id === selectedVersionId);
      showToast("切換版本成功", `已成功切換至 ${ver.tag}`);

      // 手機版自動關閉側欄抽屜
      if (window.innerWidth < 1024) {
        toggleSidebar(false);
      }
    }

    // 更新右側介紹與啟動區 UI
    function updateDisplayUI() {
      const ver = GAME_VERSIONS.find(v => v.id === selectedVersionId);
      if (!ver) return;

      // 1. 更新介紹卡片
      document.getElementById("display-version-title").innerText = ver.name;
      document.getElementById("display-version-branch").innerText = ver.branch;
      document.getElementById("display-version-date").innerText = `更新日期：${ver.date}`;

      // 顯示當前版本路徑或專案 ID 狀態
      const pathLabel = document.getElementById("display-version-path");
      if (ver.sourceType === "local") {
        pathLabel.innerText = `[相對路徑] ./${ver.path}`;
      } else if (ver.sourceType === "sb3") {
        pathLabel.innerText = `[遊戲檔案] ./${ver.path}`;
      } else {
        pathLabel.innerText = `[線上 ID] ${ver.projectId}`;
      }

      // 渲染更動日誌
      const changelogContainer = document.getElementById("display-version-changelog");
      changelogContainer.innerHTML = "";
      ver.changelog.forEach(line => {
        const li = document.createElement("li");
        li.innerText = line;
        changelogContainer.appendChild(li);
      });

      // 2. 更新啟動卡片
      document.getElementById("launch-card-ver-name").innerText = ver.name;
      document.getElementById("launch-card-ver-tag").innerText = ver.tag;
    }

    // 安全相對路徑解析器 (特別相容沙盒 blob: 網址)
    function getAbsoluteUrl(relativePath) {
      try {
        let base = window.location.href;
        // 如果當前在以 blob: 形式運作的沙盒預覽器中
        if (base.startsWith('blob:')) {
          // 嘗試提取其中真實的網址源
          const match = base.match(/blob:(https?:\/\/[^\/]+)/);
          if (match && match[1]) {
            base = match[1] + '/';
          } else {
            base = window.location.origin + '/';
          }
        }
        return new URL(relativePath, base).href;
      } catch (e) {
        // 極端情況下的安全防線
        console.warn("相對路徑解析受到限制，使用安全降級策略:", e);
        return window.location.origin + '/' + relativePath;
      }
    }

    // 啟動遊戲 (核心路徑構建邏輯)
    function launchGame() {
      const ver = GAME_VERSIONS.find(v => v.id === selectedVersionId);
      if (!ver) {
        showToast("啟動失敗", "找不到選擇的版本資料", true);
        return;
      }

      let iframeUrl = "";

      // 根據不同的來源類型構建網址
      if (ver.sourceType === "local") {
        // 直接使用相對路徑，載入您託管在 GitHub 同目錄下的 html 檔案
        iframeUrl = ver.path;
      } else if (ver.sourceType === "sb3") {
        // 動態將相對的 .sb3 轉換為完整的網址，傳給 TurboWarp 線上播放器載入
        const absoluteSb3Url = getAbsoluteUrl(ver.path);
        iframeUrl = `https://turbowarp.org/embed.html?load=${encodeURIComponent(absoluteSb3Url)}&interpolate=1&clones=Infinity&stuck=1&fps=60`;
      } else if (ver.sourceType === "online") {
        // 使用一般的線上 TurboWarp 嵌入連結
        iframeUrl = `https://turbowarp.org/projects/${ver.projectId}/embed?interpolate=1&clones=Infinity&stuck=1&fps=60`;
      }

      document.getElementById("player-game-title").innerText = ver.name;
      document.getElementById("player-game-version-badge").innerText = ver.tag;

      document.getElementById("player-loading-overlay").classList.remove("hidden");
      const iframe = document.getElementById("turbowarp-iframe");
      iframe.src = iframeUrl;

      iframe.onload = function() {
        document.getElementById("player-loading-overlay").classList.add("hidden");
      };

      document.getElementById("game-player-screen").classList.remove("hidden");
    }

    function closeGamePlayer() {
      document.getElementById("game-player-screen").classList.add("hidden");
      document.getElementById("turbowarp-iframe").src = "about:blank";
      showToast("已關閉遊戲", "期待您的下次遊玩！");
    }

    // 客製化通知
    let toastTimeout = null;
    function showToast(title, desc, isError = false) {
      const toast = document.getElementById("custom-toast");
      const iconWrap = document.getElementById("toast-icon-wrapper");
      
      document.getElementById("toast-title").innerText = title;
      document.getElementById("toast-desc").innerText = desc;

      if (isError) {
        iconWrap.className = "w-8 h-8 rounded-full flex items-center justify-center text-sm bg-red-100 text-red-600 border border-red-200 flex-shrink-0";
        iconWrap.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i>';
      } else {
        iconWrap.className = "w-8 h-8 rounded-full flex items-center justify-center text-sm bg-brandYellow-500 text-header-900 border border-brandYellow-400 flex-shrink-0";
        iconWrap.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
      }

      toast.classList.remove("translate-y-24", "opacity-0");
      toast.classList.add("translate-y-0", "opacity-100");

      if (toastTimeout) clearTimeout(toastTimeout);
      
      toastTimeout = setTimeout(() => {
        toast.classList.add("translate-y-24", "opacity-0");
        toast.classList.remove("translate-y-0", "opacity-100");
      }, 3000);
    }
  </script>
</body>
</html>
